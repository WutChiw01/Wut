<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Disto Diagnostic</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#0b1220; color:#e5eefc; margin:0; padding:20px; }
    .card { background:#162036; border:1px solid #334766; border-radius:16px; padding:16px; margin-bottom:16px; }
    input, button, textarea { width:100%; box-sizing:border-box; border-radius:12px; border:1px solid #395174; background:#0f1829; color:#fff; padding:14px; font-size:16px; margin-top:8px; }
    button { background:#2563eb; border:none; font-weight:700; }
    .ghost { background:#1f2d46; }
    .ok { color:#67e8a5; }
    .warn { color:#fbbf24; }
    pre { white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px 0">Disto Diagnostic Page</h2>
    <div id="status" class="warn">กำลังโหลด...</div>
  </div>

  <div class="card">
    <label>ทดสอบกรอกข้อมูล</label>
    <input id="name" placeholder="พิมพ์อะไรก็ได้" />
    <button onclick="tapTest()" ontouchend="tapTest()">1) ทดสอบปุ่ม Alert</button>
    <button class="ghost" onclick="saveTest()" ontouchend="saveTest()">2) ทดสอบเขียน localStorage</button>
    <button class="ghost" onclick="showValue()" ontouchend="showValue()">3) แสดงค่าที่บันทึกไว้</button>
    <button class="ghost" onclick="switchBox()" ontouchend="switchBox()">4) ทดสอบซ่อน/แสดงกล่อง</button>
  </div>

  <div id="toggle-box" class="card">
    <strong>กล่องทดสอบการสลับแสดงผล</strong>
    <div>ถ้าปุ่มทำงาน กล่องนี้จะหาย/กลับมา</div>
  </div>

  <div class="card">
    <strong>ผลลัพธ์</strong>
    <pre id="log">(ยังไม่มี)</pre>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    function log(msg) {
      logEl.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logEl.textContent;
    }
    function tapTest() {
      alert('ปุ่มทำงาน');
      log('tapTest ok');
    }
    function saveTest() {
      const value = document.getElementById('name').value || 'empty';
      localStorage.setItem('disto_diag_name', value);
      alert('บันทึกแล้ว: ' + value);
      log('saveTest ok: ' + value);
    }
    function showValue() {
      const value = localStorage.getItem('disto_diag_name');
      alert('ค่าล่าสุด: ' + value);
      log('showValue ok: ' + value);
    }
    function switchBox() {
      const box = document.getElementById('toggle-box');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
      log('switchBox ok: ' + box.style.display);
    }
    window.addEventListener('load', () => {
      statusEl.textContent = 'โหลด JS สำเร็จ, พร้อมทดสอบ';
      statusEl.className = 'ok';
      log('page load ok');
    });
  </script>
</body>
</html>
