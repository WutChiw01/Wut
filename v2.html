<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Disto Survey v2 Rebuild</title>
  <script src="vendor/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:#0b1220; --card:#18243b; --card2:#0f1829; --text:#eaf2ff; --muted:#9fb2d1;
      --blue:#2f6df6; --blue2:#1e4ed8; --green:#22c55e; --amber:#f59e0b; --border:#314766;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); max-width:500px; margin-inline:auto; padding-bottom:120px; -webkit-text-size-adjust:100%; }
    header { position:sticky; top:0; background:#101a2c; padding:14px 16px; border-bottom:1px solid var(--border); z-index:10; }
    h1 { margin:0; font-size:18px; }
    .sub { color:var(--muted); font-size:12px; margin-top:2px; }
    .page { display:none; padding:16px; }
    .page.active { display:block; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:14px; }
    .card.soft { background:var(--card2); }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    input, textarea, button, select { width:100%; border-radius:12px; border:1px solid var(--border); background:#0f1829; color:var(--text); padding:14px; font-size:16px; }
    input, textarea, select { scroll-margin-top: 90px; }
    textarea { min-height:160px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn { background:linear-gradient(135deg,var(--blue),var(--blue2)); border:none; font-weight:700; }
    .ghost { background:#23314b; }
    .success { background:linear-gradient(135deg,#15803d,#16a34a); border:none; font-weight:700; }
    nav { position:fixed; bottom:0; left:0; right:0; max-width:500px; margin:auto; background:#101a2c; border-top:1px solid var(--border); display:flex; z-index:20; }
    nav button { border:none; border-radius:0; background:none; color:var(--muted); padding:10px 6px; font-size:12px; }
    nav button.active { color:#fff; }
    .ok { color:#86efac; } .warn { color:#fbbf24; } .bad { color:#f87171; }
    pre { white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.5; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; font-size:12px; background:#22314e; color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Disto Survey v2 Rebuild</h1>
    <div class="sub">สร้างใหม่บนฐานที่นิ่งสำหรับ iPhone/Safari</div>
  </header>

  <section id="page-connect" class="page active">
    <div class="card">
      <div><strong>สถานะระบบ</strong></div>
      <div id="app-status" class="ok" style="margin-top:8px">พร้อมใช้งาน</div>
      <div style="margin-top:10px" class="pill">No-bot production</div>
    </div>

    <form class="card" onsubmit="saveProject(); return false;">
      <div style="font-weight:700; margin-bottom:10px">ข้อมูลโครงการ</div>
      <label>ชื่อโครงการ / บ้าน</label>
      <input id="proj-name" placeholder="เช่น บ้านคุณสมชาย ซอย 5" />
      <label style="margin-top:10px">ที่อยู่</label>
      <input id="proj-addr" placeholder="เลขที่ / ถนน / ตำบล" />
      <div class="row" style="margin-top:10px">
        <div>
          <label>ผู้สำรวจ</label>
          <input id="proj-surveyor" placeholder="ชื่อ-สกุล" />
        </div>
        <div>
          <label>วันที่</label>
          <input id="proj-date" type="date" />
        </div>
      </div>
      <button type="submit" class="btn" style="margin-top:12px">💾 บันทึกข้อมูลโครงการ</button>
    </form>

    <div class="card soft">
      <div style="font-weight:700; margin-bottom:8px">เรียกผู้ช่วย</div>
      <div style="color:var(--muted); margin-bottom:10px">คัดลอกข้อมูลสถานะล่าสุดเพื่อส่งมาหาผมตอนต้องการความช่วยเหลือ</div>
      <button class="ghost" onclick="copyAssistant()">👻 คัดลอกสถานะส่งผู้ช่วย</button>
    </div>
  </section>

  <section id="page-measure" class="page">
    <div class="card">
      <div style="font-weight:700; margin-bottom:10px">วัดระยะแบบ manual</div>
      <label>ระยะเชิงชาย (ม.)</label>
      <input id="m-eave" type="number" step="0.01" placeholder="เช่น 8.50" />
      <label style="margin-top:10px">ระยะจันทัน / ลาดเอียง (ม.)</label>
      <input id="m-rafter" type="number" step="0.01" placeholder="เช่น 4.20" />
      <button class="btn" style="margin-top:12px" onclick="saveMeasure()">📏 บันทึกและคำนวณ</button>
    </div>
    <div class="card soft">
      <div style="font-weight:700; margin-bottom:8px">ค่าที่บันทึกล่าสุด</div>
      <pre id="measure-preview">(ยังไม่มี)</pre>
    </div>
  </section>

  <section id="page-layout" class="page">
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px">ผลคำนวณเบื้องต้น</div>
      <pre id="calc-output">(ยังไม่มี)</pre>
    </div>
  </section>

  <section id="page-report" class="page">
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px">รายงาน</div>
      <pre id="report-output">(ยังไม่มี)</pre>
      <button class="success" style="margin-top:12px" onclick="downloadPdf()">📄 สร้าง PDF</button>
    </div>
  </section>

  <section id="page-settings" class="page">
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px">ตั้งค่าแผง</div>
      <div class="row">
        <div>
          <label>กว้างแผง (ม.)</label>
          <input id="panel-w" type="number" step="0.01" value="1.13" />
        </div>
        <div>
          <label>ยาวแผง (ม.)</label>
          <input id="panel-h" type="number" step="0.01" value="2.28" />
        </div>
      </div>
      <label style="margin-top:10px">กำลังไฟต่อแผง (Wp)</label>
      <input id="panel-watt" type="number" step="1" value="570" />
      <button class="btn" style="margin-top:12px" onclick="saveSettings()">💾 บันทึกการตั้งค่า</button>
    </div>
  </section>

  <nav>
    <button data-page="connect" class="active" onclick="goPage('connect')">เชื่อมต่อ</button>
    <button data-page="measure" onclick="goPage('measure')">วัดระยะ</button>
    <button data-page="layout" onclick="goPage('layout')">ผลคำนวณ</button>
    <button data-page="report" onclick="goPage('report')">รายงาน</button>
    <button data-page="settings" onclick="goPage('settings')">ตั้งค่า</button>
  </nav>

  <script>
    const KEY = 'disto_v2_rebuild_state';
    const state = {
      project: { name:'', address:'', surveyor:'', date:'' },
      measure: { eave:null, rafter:null, totalArea:null, panelCount:null, estimatedPower:null },
      settings: { panelW:1.13, panelH:2.28, panelWatt:570 }
    };

    function persist() { localStorage.setItem(KEY, JSON.stringify(state)); }
    function load() {
      const raw = localStorage.getItem(KEY);
      if (!raw) return;
      try {
        const saved = JSON.parse(raw);
        Object.assign(state.project, saved.project || {});
        Object.assign(state.measure, saved.measure || {});
        Object.assign(state.settings, saved.settings || {});
      } catch {}
    }
    function bindState() {
      document.getElementById('proj-name').value = state.project.name || '';
      document.getElementById('proj-addr').value = state.project.address || '';
      document.getElementById('proj-surveyor').value = state.project.surveyor || '';
      document.getElementById('proj-date').value = state.project.date || new Date().toISOString().split('T')[0];
      document.getElementById('panel-w').value = state.settings.panelW;
      document.getElementById('panel-h').value = state.settings.panelH;
      document.getElementById('panel-watt').value = state.settings.panelWatt;
      document.getElementById('m-eave').value = state.measure.eave ?? '';
      document.getElementById('m-rafter').value = state.measure.rafter ?? '';
      renderAll();
    }
    function goPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
      document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    }
    function saveProject() {
      state.project.name = document.getElementById('proj-name').value || '';
      state.project.address = document.getElementById('proj-addr').value || '';
      state.project.surveyor = document.getElementById('proj-surveyor').value || '';
      state.project.date = document.getElementById('proj-date').value || '';
      persist();
      alert('บันทึกข้อมูลโครงการแล้ว');
      goPage('measure');
    }
    function saveSettings() {
      state.settings.panelW = parseFloat(document.getElementById('panel-w').value) || 1.13;
      state.settings.panelH = parseFloat(document.getElementById('panel-h').value) || 2.28;
      state.settings.panelWatt = parseFloat(document.getElementById('panel-watt').value) || 570;
      persist();
      alert('บันทึกการตั้งค่าแล้ว');
    }
    function saveMeasure() {
      state.measure.eave = parseFloat(document.getElementById('m-eave').value) || 0;
      state.measure.rafter = parseFloat(document.getElementById('m-rafter').value) || 0;
      state.measure.totalArea = +(state.measure.eave * state.measure.rafter).toFixed(2);
      const panelArea = state.settings.panelW * state.settings.panelH;
      state.measure.panelCount = panelArea > 0 ? Math.floor(state.measure.totalArea / panelArea) : 0;
      state.measure.estimatedPower = state.measure.panelCount * state.settings.panelWatt;
      persist();
      renderAll();
      alert('บันทึกและคำนวณแล้ว');
      goPage('layout');
    }
    function renderAll() {
      document.getElementById('measure-preview').textContent = JSON.stringify(state.measure, null, 2);
      document.getElementById('calc-output').textContent = [
        'พื้นที่รวม: ' + (state.measure.totalArea ?? '-') + ' ตร.ม.',
        'จำนวนแผงโดยประมาณ: ' + (state.measure.panelCount ?? '-') + ' แผง',
        'กำลังผลิตโดยประมาณ: ' + ((state.measure.estimatedPower ?? 0) / 1000).toFixed(2) + ' kWp'
      ].join('\n');
      document.getElementById('report-output').textContent = JSON.stringify({ project: state.project, measure: state.measure, settings: state.settings }, null, 2);
    }
    function copyAssistant() {
      const text = [
        'DISTO V2 REBUILD ASSIST REQUEST',
        'เวลา: ' + new Date().toLocaleString('th-TH'),
        'ออนไลน์: ' + (navigator.onLine ? 'yes' : 'no'),
        JSON.stringify({ project: state.project, measure: state.measure, settings: state.settings }, null, 2)
      ].join('\n');
      navigator.clipboard.writeText(text).then(() => alert('คัดลอกสถานะแล้ว')).catch(() => alert(text));
    }
    function downloadPdf() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text('Disto Survey v2 Rebuild Report', 14, 20);
      const lines = doc.splitTextToSize(JSON.stringify({ project: state.project, measure: state.measure, settings: state.settings }, null, 2), 180);
      doc.text(lines, 14, 32);
      doc.save('disto-v2-report.pdf');
    }
    window.addEventListener('load', () => {
      load();
      bindState();
      const focusables = document.querySelectorAll('input, textarea, select');
      focusables.forEach(el => {
        el.addEventListener('focus', () => {
          setTimeout(() => {
            try { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch {}
          }, 250);
        });
      });
    });
  </script>
</body>
</html>
